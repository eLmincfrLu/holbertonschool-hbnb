<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="images/logo.png" alt="HBnB Logo" class="logo"></a>
    </header>

    <main>
        <form id="review-form" class="form">
            <h2>Add a Review</h2>
            
            <label for="review-text">Your Comment:</label>
            <textarea id="review-text" rows="5" required placeholder="Tell us about your stay..."></textarea>

            <label for="rating">Rating (1-5):</label>
            <select id="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
            </select>

            <button type="submit" class="login-button">Submit Review</button>
            <button type="button" onclick="window.history.back()" style="background: gray; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Cancel</button>
        </form>
    </main>

    <footer>
        <p>© 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
</body>
</html>
